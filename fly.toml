# fly.toml app configuration file generated for dinner-app on 2026-02-18T22:37:59-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dinner-app'
primary_region = 'ord'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  release_command = 'bin/rails db:prepare'

[env]
  RAILS_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'dinner_app_storage'
  destination = '/rails/storage'

[http_service]
  processes = ["app"]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[processes]
  app = "./bin/rails server"

